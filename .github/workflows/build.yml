name: Build Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Download FFmpeg for Windows
        shell: pwsh
        run: |
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Write-Host "Downloading FFmpeg from $ffmpegUrl"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.zip
          Write-Host "Extracting FFmpeg..."
          Expand-Archive -Path ffmpeg.zip -DestinationPath . -Force
          $ffmpegDir = Get-ChildItem -Path . -Filter "ffmpeg*" -Directory | Select-Object -First 1
          if ($ffmpegDir) {
            New-Item -ItemType Directory -Path "build-resources\win" -Force | Out-Null
            Copy-Item -Path "$($ffmpegDir.FullName)\bin\ffmpeg.exe" -Destination "build-resources\win\ffmpeg.exe" -Force
            Write-Host "FFmpeg copied to build-resources\win\ffmpeg.exe"
          } else {
            Write-Host "ERROR: FFmpeg directory not found!"
            exit 1
          }
          Remove-Item ffmpeg.zip -Force -ErrorAction SilentlyContinue
      
      - name: Verify FFmpeg exists
        run: dir build-resources\win\ffmpeg.exe
      
      - name: Build Windows MSI
        run: npm run tauri build -- --bundles msi
      
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
