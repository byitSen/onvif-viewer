<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a4a7a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>
  
  <!-- Camera body -->
  <rect x="200" y="350" width="624" height="380" rx="40" fill="#0f3460"/>
  
  <!-- Lens outer ring -->
  <circle cx="512" cy="540" r="150" fill="#16213e" stroke="#e94560" stroke-width="8"/>
  
  <!-- Lens inner -->
  <circle cx="512" cy="540" r="110" fill="url(#screen)"/>
  
  <!-- Lens reflection -->
  <ellipse cx="470" cy="500" rx="30" ry="20" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Camera top details -->
  <rect x="300" y="280" width="150" height="70" rx="15" fill="#16213e"/>
  <circle cx="375" cy="315" r="15" fill="#e94560"/>
  
  <!-- Screen overlay lines -->
  <line x1="350" y1="470" x2="350" y2="610" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="420" y1="450" x2="420" y2="630" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="490" y1="440" x2="490" y2="640" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="560" y1="450" x2="560" y2="630" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="630" y1="470" x2="630" y2="610" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Side indicators -->
  <circle cx="180" cy="540" r="25" fill="#22c55e"/>
  <circle cx="844" cy="540" r="25" fill="#22c55e"/>
</svg>
